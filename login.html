<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f8f6f1">
    <title>Entrar | MedControl</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card">
            <a class="brand" href="index.html">
                <span class="brand-badge">+</span>
                <span>MedControl</span>
            </a>

            <h1>Bem-vindo de volta</h1>
            <p class="helper-text">
                Entre para consultar os remedios cadastrados, acompanhar o historico e manter os lembretes organizados.
            </p>

            <div class="auth-form">
                <input type="email" placeholder="Digite seu email" id="email">
                <input type="password" placeholder="Digite sua senha" id="senha">
                <button class="primary-btn" onclick="login()">Entrar</button>
            </div>

            <p class="auth-footer">
                Nao tem conta? <a href="cadastro.html">Criar conta</a>
            </p>
        </section>
    </main>

    <script type="module" src="js/pwa.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
