<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f8f6f1">
    <title>Criar Conta | MedControl</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card">
            <a class="brand" href="index.html">
                <span class="brand-badge">+</span>
                <span>MedControl</span>
            </a>

            <h1>Crie sua conta</h1>
            <p class="helper-text">
                Monte uma rotina mais tranquila para acompanhar horarios, doses e historico dos remedios.
            </p>

            <div class="auth-form">
                <input type="email" placeholder="Digite seu email" id="email">
                <input type="password" placeholder="Digite sua senha" id="senha">
                <input type="password" placeholder="Confirme sua senha" id="confirmarSenha">
                <button class="primary-btn" onclick="cadastrar()">Cadastrar</button>
            </div>

            <p class="auth-footer">
                Ja tem conta? <a href="login.html">Entrar</a>
            </p>
        </section>
    </main>

    <script type="module" src="js/pwa.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
