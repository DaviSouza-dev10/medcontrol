<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Seus Remedios</h1>

        <div class="form-remedio">

            <input type="text" id="nome" placeholder="Nome do remedio"><br><br>

            <input type="text" id="dose" placeholder="Dose (ex: 500mg)"><br><br>

            <input type="time" id="horario"><br><br>

            <button onclick="salvarRemedio()">Salvar</button>

        </div>

        <div id="lista-remedios"></div>

    </div>

    <div id="historico">
        <h2>Historico de Medicamentos</h2>
        <ul id="lista-registros"></ul>
    </div>

    <script type="module" src="js/script.js"></script>
</body>
</html>
